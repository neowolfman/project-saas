server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          # Escucha en todas las interfaces: otros contenedores envían trazas aquí
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction_window: 1h
  max_block_bytes: 100_000_000
  block_retention: 48h
  compacted_block_retention: 10m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

querier:
  frontend_worker:
    # Loopback interno del proceso único de Tempo (single-binary mode)
    frontend_address: 127.0.0.1:9095

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: local
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      # Servicio Docker "prometheus" en data-net (comunicación inter-contenedor)
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
