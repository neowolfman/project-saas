# =============================================================================
# Traefik dynamic routes — file provider (no requiere Docker socket).
# Rutas explícitas a cada servicio por nombre de contenedor (DNS de Docker).
# =============================================================================

http:
  routers:
    backend:
      rule: "Host(`api.saas.local`)"
      entryPoints: [web]
      service: backend
      middlewares: [security-headers, ratelimit-general]

    landing:
      rule: "Host(`saas.local`)"
      entryPoints: [web]
      service: landing
      middlewares: [security-headers]

    app:
      rule: "Host(`app.saas.local`)"
      entryPoints: [web]
      service: app
      middlewares: [security-headers]

    rabbitmq:
      rule: "Host(`rabbitmq.saas.local`)"
      entryPoints: [web]
      service: rabbitmq

    minio-console:
      rule: "Host(`minio.saas.local`)"
      entryPoints: [web]
      service: minio-console

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    landing:
      loadBalancer:
        servers:
          - url: "http://landing:3000"

    app:
      loadBalancer:
        servers:
          - url: "http://app:3000"

    rabbitmq:
      loadBalancer:
        servers:
          - url: "http://rabbitmq:15672"

    minio-console:
      loadBalancer:
        servers:
          - url: "http://minio:9001"
