name: saas-pm-finops

# Full infrastructure stack: data plane, search, reverse proxy/load balancer.
# Endurecimiento de producción (secrets, red interna, backups, auth) en docker-compose.prod.yml.

networks:
  data-net:
    driver: bridge
    internal: true
  gateway-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24

volumes:
  pg-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  opensearch-data:
  traefik-certs:
  landing-next:
  app-next:

services:

  postgres:
    image: timescale/timescaledb:2.15.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      APP_API_PASSWORD: ${APP_API_PASSWORD:?APP_API_PASSWORD is required}
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ../postgres/01-create-app-role.sh:/docker-entrypoint-initdb.d/01-create-app-role.sh:ro
    networks: [data-net, gateway-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-saas}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.5", memory: 256M }

  redis:
    image: valkey/valkey:7.2
    restart: unless-stopped
    command:
      - "valkey-server"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis-data:/data
    networks: [data-net, gateway-net]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 384M }
        reservations: { cpus: "0.1", memory: 64M }

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks: [data-net, gateway-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.saas.local`)"
      - "traefik.http.routers.rabbitmq.entrypoints=web"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    networks: [data-net, gateway-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-api.rule=Host(`minio.saas.local`) && PathPrefix(`/api`)"
      - "traefik.http.routers.minio-api.entrypoints=web"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`minio.saas.local`)"
      - "traefik.http.routers.minio-console.entrypoints=web"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 384M }
        reservations: { cpus: "0.1", memory: 64M }

  minio-init:
    image: minio/mc:RELEASE.2024-10-02T08-27-28Z
    depends_on:
      minio: { condition: service_healthy }
    networks: [data-net, gateway-net]
    entrypoint:
      - "/bin/sh"
      - "-c"
      - |
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required} &&
        mc mb -p --with-lock local/audit-ledger-archive &&
        mc retention set --default COMPLIANCE 2555d local/audit-ledger-archive &&
        mc anonymous set none local/audit-ledger-archive
    restart: "no"

  migrate:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-saas}
    working_dir: /app/apps/backend
    command: ["-c", "migrations/alembic.ini", "upgrade", "head"]
    entrypoint: ["/opt/venv/bin/alembic"]
    networks: [data-net, gateway-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  dev-runner:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    user: "root"
    volumes:
      - ../../:/app
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-saas}
      APP_API_PASSWORD: ${APP_API_PASSWORD:?APP_API_PASSWORD is required}
      PYTHONPATH: /app:/app/libs/ddd-core:/app/libs/db-clients:/app/libs/security-utils
      ENV: development
    entrypoint: ["/bin/sh", "-c"]
    command: ["tail -f /dev/null"]
    networks: [data-net, gateway-net]
    depends_on:
      postgres: { condition: service_healthy }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-saas}
      POSTGRES_USER: app_api
      APP_API_PASSWORD: ${APP_API_PASSWORD:?APP_API_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GIT_WEBHOOK_SECRET: ${GIT_WEBHOOK_SECRET:?GIT_WEBHOOK_SECRET is required}
      ENV: development
    working_dir: /app
    entrypoint: ["/opt/venv/bin/uvicorn"]
    command: ["apps.backend.src.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=10.20.0.0/24"]
    networks: [data-net, gateway-net]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gateway-net"
      - "traefik.http.routers.backend.rule=Host(`api.saas.local`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      - "traefik.http.routers.backend.middlewares=security-headers@file,ratelimit-general@file"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }

  workers:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-saas}
      POSTGRES_USER: app_api
      APP_API_PASSWORD: ${APP_API_PASSWORD:?APP_API_PASSWORD is required}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      ENV: development
    working_dir: /app
    entrypoint: ["/opt/venv/bin/faststream"]
    command: ["run", "apps.workers.src.runner:app"]
    networks: [data-net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 384M }
        reservations: { cpus: "0.1", memory: 64M }


  landing:
    build:
      context: ../..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    volumes:
      - ../../:/app
      - /app/node_modules
      - landing-next:/app/apps/landing/.next
    environment:
      NEXT_PUBLIC_API_URL: http://api.saas.local
      NODE_ENV: development
    command: ["pnpm", "--filter", "@saas/landing", "dev", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "3001:3000"
    networks: [gateway-net]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gateway-net"
      - "traefik.http.routers.landing.rule=Host(`saas.local`)"
      - "traefik.http.routers.landing.entrypoints=web"
      - "traefik.http.services.landing.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || curl -sf http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }

  app:
    build:
      context: ../..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped
    volumes:
      - ../../:/app
      - /app/node_modules
      - app-next:/app/apps/app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://api.saas.local
      NODE_ENV: development
    command: ["pnpm", "--filter", "@saas/app", "dev", "--hostname", "0.0.0.0", "--port", "3000"]
    ports:
      - "3002:3000"
    networks: [gateway-net]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=gateway-net"
      - "traefik.http.routers.app.rule=Host(`app.saas.local`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || curl -sf http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 128M }

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: saas-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:?OPENSEARCH_INITIAL_ADMIN_PASSWORD is required}
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks: [data-net]
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9200/_cluster/health | grep 200 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.25", memory: 256M }

  traefik:
    image: traefik:3.2.0
    container_name: saas-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--ping=true"
      - "--ping.entrypoint=traefik"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=gateway-net"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--metrics.prometheus.buckets=0.1,0.2,0.5,1.0,2.0,5.0"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@saas.local"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/letsencrypt
    networks: [data-net, gateway-net]
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 64M }
